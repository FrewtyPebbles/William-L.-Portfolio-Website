services:
  db:
    image: postgres:latest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d portfolio_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: portfolio_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
  web:
    build:
      context: .
      args:
        - ENVIRONMENT=dev
    user: "root"
    command: >
      sh -c "chown -R node:node /app/public/static/uploads && 
             su node -c 'npx prisma migrate deploy && node server.js'"
    ports:
      - "80:3000"
    volumes:
      - public_files:/app/public/static/uploads
    environment:
      # Ensure the app looks for the DB file in the mounted volume path
      database_username: user
      database_password: password
      DATABASE_URL: postgresql://user:password@db:5432/portfolio_db
      ENVIRONMENT: dev
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_COOKIE_SECRET: ${ADMIN_COOKIE_SECRET}
    restart: always


volumes:
  # Define the named volume for persistence
  postgres_data:
  public_files:
